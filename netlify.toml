# ── Build ─────────────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = "dist"

# ── Local dev ─────────────────────────────────────────────────────
# Explicitly configure dev so the CLI doesn't auto-detect Vite AND
# also run npm run dev, which causes a double-start / port conflict.
[dev]
  command     = "npm run dev"
  targetPort  = 5173
  port        = 8888
  autoLaunch  = false

# ── Functions ─────────────────────────────────────────────────────
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# ── Redirects ─────────────────────────────────────────────────────
# IMPORTANT: /api/blogs must appear BEFORE the SPA catch-all,
# otherwise /* swallows it and the function is never invoked.

[[redirects]]
  from   = "/api/blogs"
  to     = "/.netlify/functions/blogs"
  status = 200
  force  = true

# ── Latest News API ──────────────────────────────────────────────────
# Public read endpoint (no auth) — returns published items sorted by order.
[[redirects]]
  from   = "/api/latest-news"
  to     = "/.netlify/functions/latest-news"
  status = 200
  force  = true

# Admin CRUD endpoint (Bearer token via NEWS_ADMIN_TOKEN).
# More specific routes MUST come before less specific ones, so reorder /:id
# branches are matched before the bare collection URL.
[[redirects]]
  from   = "/api/admin/latest-news/*"
  to     = "/.netlify/functions/admin-latest-news/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/admin/latest-news"
  to     = "/.netlify/functions/admin-latest-news"
  status = 200
  force  = true

# Clients / Brands API
[[redirects]]
  from   = "/api/clients"
  to     = "/.netlify/functions/clients"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/admin/clients/*"
  to     = "/.netlify/functions/admin-clients/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/admin/clients"
  to     = "/.netlify/functions/admin-clients"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
